<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiant Homes — SOA Generator</title>
<link href="https://fonts.bunny.net/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --blue: #1565a0; --blue-deep: #0d4a75; --green: #1a8a6a; --coral: #d94f4f; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0d1b2a, #1b2d45, #0d4a75); color: #fff; min-height: 100vh; padding: 32px 24px; -webkit-font-smoothing: antialiased; }
  .container { max-width: 900px; margin: 0 auto; }
  .brand { font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--blue); text-align: center; margin-bottom: 6px; }
  h1 { font-size: 36px; font-weight: 800; text-align: center; letter-spacing: -1px; margin-bottom: 8px; }
  .subtitle { font-size: 15px; color: rgba(255,255,255,0.45); text-align: center; margin-bottom: 40px; }
  .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 28px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
  .upload-zone { border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; padding: 56px 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: var(--blue); background: rgba(21,101,160,0.1); }
  .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: rgba(255,255,255,0.4); }
  .label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
  .row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .field { flex: 1; min-width: 180px; }
  .status { background: rgba(26,138,106,0.15); border: 1px solid var(--green); border-radius: 8px; padding: 10px 14px; color: var(--green); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; appearance: none; }
  select option { background: #1b2d45; }
  .btn-outline { padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5); cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; width: 100%; text-align: center; transition: all 0.15s; }
  .btn-outline:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
  .btn-outline.active { border-color: var(--green); color: var(--green); background: rgba(26,138,106,0.1); }
  .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .unit-card { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); transition: all 0.15s; }
  .unit-card:hover { border-color: rgba(255,255,255,0.2); }
  .unit-card.selected { border-color: var(--blue); background: rgba(21,101,160,0.15); }
  .unit-card.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
  .cb { width: 18px; height: 18px; border-radius: 4px; border: 2px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; font-size: 11px; font-weight: 700; }
  .unit-card.selected .cb { border-color: var(--blue); background: var(--blue); }
  .unit-name { font-size: 13px; font-weight: 600; }
  .unit-sub { font-size: 10px; color: rgba(255,255,255,0.4); }
  .actions { display: flex; gap: 8px; }
  .btn-sm { background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 4px 12px; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 11px; font-family: inherit; }
  .btn-sm:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
  .btn-gen { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; background: linear-gradient(135deg, var(--blue), var(--blue-deep)); color: #fff; }
  .btn-gen:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(21,101,160,0.4); }
  .btn-gen:disabled { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); cursor: not-allowed; transform: none; box-shadow: none; }
  .result-card { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px 20px; margin-bottom: 8px; }
  .result-name { font-size: 15px; font-weight: 600; }
  .result-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .result-skip { opacity: 0.4; }
  .btn-dl { padding: 10px 20px; border-radius: 8px; border: none; background: var(--green); color: #fff; cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; width: 100%; margin-top: 16px; }
  .btn-dl:hover { background: #1fa87e; }
  .progress { text-align: center; padding: 32px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { font-size: 14px; color: rgba(255,255,255,0.5); }
  .hidden { display: none !important; }
  .change-btn { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 13px; font-family: inherit; margin-left: auto; }
  .change-btn:hover { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
<div class="container">
  <div class="brand">Radiant Homes</div>
  <h1>SOA Generator</h1>
  <p class="subtitle">Upload your P&L workbook → Select month → Download all owner statements as PDFs</p>

  <!-- Step 1: Upload -->
  <div id="step-upload" class="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📊</div>
    <h3>Drop your P&L Workbook here</h3>
    <p>or click to browse — .xlsx format</p>
    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
  </div>

  <!-- Step 2: Configure -->
  <div id="step-config" class="card hidden">
    <div class="row">
      <div class="field">
        <span class="label">Workbook</span>
        <div class="status"><span>✓</span> <span id="file-info"></span> <button class="change-btn" onclick="reset()">Change</button></div>
      </div>
      <div class="field" style="max-width:160px">
        <span class="label">Logo (optional)</span>
        <button class="btn-outline" id="logo-btn" onclick="document.getElementById('logo-input').click()">Upload PNG</button>
        <input type="file" id="logo-input" accept="image/*" style="display:none">
      </div>
      <div class="field" style="max-width:220px">
        <span class="label">Month</span>
        <select id="month-select"></select>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="label" style="margin:0">Select Units</span>
      <div class="actions">
        <button class="btn-sm" onclick="selectAll()">All active</button>
        <button class="btn-sm" onclick="clearAll()">Clear</button>
      </div>
    </div>
    <div id="unit-grid" class="unit-grid"></div>
    <button id="btn-generate" class="btn-gen" disabled onclick="generate()">Select units to generate</button>
  </div>

  <!-- Step 3: Progress -->
  <div id="step-progress" class="card hidden">
    <div class="progress">
      <div class="spinner"></div>
      <div id="progress-text" class="progress-text">Generating SOAs...</div>
    </div>
  </div>

  <!-- Step 4: Results -->
  <div id="step-results" class="card hidden">
    <span class="label">Generated Statements</span>
    <div id="results-list" style="margin-top:12px"></div>
    <button id="btn-download" class="btn-dl" style="display:none">⬇ Download All PDFs (.zip)</button>
    <button class="btn-sm" style="width:100%;margin-top:8px;padding:10px" onclick="backToConfig()">← Generate more</button>
  </div>
</div>

<script>
let state = { wbPath: null, units: [], months: [], selected: new Set(), logoB64: null, zipPath: null };

// ─── Upload ───
const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('step-upload');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = '#1565a0'; uploadZone.style.background = 'rgba(21,101,160,0.1)'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = ''; uploadZone.style.background = ''; });
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.style.borderColor = ''; uploadZone.style.background = ''; if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

document.getElementById('logo-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.logoB64 = ev.target.result.split(',')[1];
    const btn = document.getElementById('logo-btn');
    btn.textContent = '✓ Uploaded';
    btn.classList.add('active');
  };
  reader.readAsDataURL(file);
});

document.getElementById('month-select').addEventListener('change', e => {
  state.selected.clear();
  renderUnits();
  selectAll();
});

async function uploadFile(file) {
  const form = new FormData();
  form.append('file', file);

  uploadZone.innerHTML = '<div class="progress"><div class="spinner"></div><div class="progress-text">Reading workbook...</div></div>';

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) { alert(data.error); location.reload(); return; }

    state.wbPath = data.wb_path;
    state.units = data.units;
    state.months = data.months;

    document.getElementById('file-info').textContent = `${data.units.length} units · ${data.months.length} months`;
    const sel = document.getElementById('month-select');
    sel.innerHTML = data.months.map(m => {
      const [y, mn] = m.split('-');
      const ms = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `<option value="${m}">${ms[parseInt(mn)]} ${y}</option>`;
    }).join('');

    uploadZone.classList.add('hidden');
    document.getElementById('step-config').classList.remove('hidden');
    renderUnits();
    selectAll();
  } catch (err) {
    alert('Upload failed: ' + err.message);
    location.reload();
  }
}

// ─── Units ───
function renderUnits() {
  const grid = document.getElementById('unit-grid');
  const month = document.getElementById('month-select').value;
  grid.innerHTML = '';

  state.units.forEach(u => {
    const isActive = u.active === 'Yes';
    const sel = state.selected.has(u.code);
    const div = document.createElement('div');
    div.className = 'unit-card' + (sel ? ' selected' : '') + (!isActive ? ' disabled' : '');
    div.innerHTML = `<div class="cb">${sel ? '✓' : ''}</div><div><div class="unit-name">${u.code}</div><div class="unit-sub">${u.building} · ${u.owner}</div></div>`;
    if (isActive) div.onclick = () => { state.selected.has(u.code) ? state.selected.delete(u.code) : state.selected.add(u.code); renderUnits(); updateBtn(); };
    grid.appendChild(div);
  });
  updateBtn();
}

function selectAll() { state.units.filter(u => u.active === 'Yes').forEach(u => state.selected.add(u.code)); renderUnits(); }
function clearAll() { state.selected.clear(); renderUnits(); }
function updateBtn() {
  const btn = document.getElementById('btn-generate');
  const n = state.selected.size;
  const month = document.getElementById('month-select').value;
  const [y, m] = month.split('-');
  const ms = ["","January","February","March","April","May","June","July","August","September","October","November","December"];
  btn.disabled = n === 0;
  btn.textContent = n > 0 ? `Generate ${n} SOA${n > 1 ? 's' : ''} — ${ms[parseInt(m)]} ${y}` : 'Select units to generate';
}

// ─── Generate ───
async function generate() {
  const month = document.getElementById('month-select').value;
  document.getElementById('step-config').classList.add('hidden');
  document.getElementById('step-results').classList.add('hidden');
  document.getElementById('step-progress').classList.remove('hidden');
  document.getElementById('progress-text').textContent = `Generating ${state.selected.size} SOAs...`;

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ wb_path: state.wbPath, month, units: Array.from(state.selected), logo_b64: state.logoB64 }),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); backToConfig(); return; }

    state.zipPath = data.zip_path;

    const list = document.getElementById('results-list');
    list.innerHTML = '';
    let okCount = 0;

    data.results.forEach(r => {
      const div = document.createElement('div');
      if (r.status === 'ok') {
        okCount++;
        div.className = 'result-card';
        div.innerHTML = `<div><div class="result-name">${r.name}</div><div class="result-sub">Gross: AED ${r.gross.toLocaleString()} · Payout: AED ${r.payout.toLocaleString()} · ${r.bookings} bookings</div></div>`;
      } else {
        div.className = 'result-card result-skip';
        div.innerHTML = `<div><div class="result-name">${r.code}</div><div class="result-sub">${r.msg}</div></div>`;
      }
      list.appendChild(div);
    });

    const dlBtn = document.getElementById('btn-download');
    if (okCount > 0) {
      dlBtn.style.display = 'block';
      dlBtn.textContent = `⬇ Download ${okCount} PDF${okCount > 1 ? 's' : ''} (.zip)`;
      const [y, m] = month.split('-');
      const ms = ["","January","February","March","April","May","June","July","August","September","October","November","December"];
      dlBtn.onclick = () => { window.location.href = `/api/download?path=${encodeURIComponent(state.zipPath)}&month=${ms[parseInt(m)]}_${y}`; };
    } else {
      dlBtn.style.display = 'none';
    }

    document.getElementById('step-progress').classList.add('hidden');
    document.getElementById('step-results').classList.remove('hidden');
  } catch (err) {
    alert('Generation failed: ' + err.message);
    backToConfig();
  }
}

function backToConfig() {
  document.getElementById('step-progress').classList.add('hidden');
  document.getElementById('step-results').classList.add('hidden');
  document.getElementById('step-config').classList.remove('hidden');
}

function reset() {
  state = { wbPath: null, units: [], months: [], selected: new Set(), logoB64: null, zipPath: null };
  document.getElementById('step-config').classList.add('hidden');
  document.getElementById('step-results').classList.add('hidden');
  const uz = document.getElementById('step-upload');
  uz.classList.remove('hidden');
  uz.innerHTML = '<div class="icon">📊</div><h3>Drop your P&L Workbook here</h3><p>or click to browse — .xlsx format</p><input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">';
  document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });
}
</script>
</body>
</html>
